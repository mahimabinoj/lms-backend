name: Backend CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    # FIX: Tell GitHub to look inside your backend folder
    defaults:
      run:
        working-directory: ./backend-folder-name # CHANGE THIS to your actual folder name

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Required for better SonarQube analysis

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: pytest || true
