name: Backend CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    # FIX: Tell GitHub to look inside your backend folder
    defaults:
      run:
        working-directory: ./backend-flask

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Required for better SonarQube analysis

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: pytest || true

      # TASK 3: SonarQube (SonarCloud) Integration
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Automatically provided by GitHub
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          # This tells SonarCloud to use the secrets you created
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.sources=.
            -Dsonar.python.version=3
